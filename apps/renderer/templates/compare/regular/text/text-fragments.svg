<svg width="1108" height="565" viewBox="0 0 1108 565" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <filter id="shadow-219469091" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="3" dy="3" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <text filter="url(#shadow-219469091)" fractyl-id="displayname_1" x="272" y="110.5" text-anchor="middle" dominant-baseline="central" font-family="Minecraft" font-size="18" font-weight="400" fill="{displayname_1#fill}">
        {displayname_1#text}
    </text>
