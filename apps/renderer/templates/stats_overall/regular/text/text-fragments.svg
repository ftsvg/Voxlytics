<svg width="820" height="460" viewBox="0 0 820 460" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <filter id="shadow-219469091" color-interpolation-filters="sRGB">
            <!-- Offset the colored text -->
            <feOffset dx="3" dy="3" in="SourceGraphic" result="offsetColor"/>
            <!-- Blur it -->
            <feGaussianBlur in="offsetColor" stdDeviation="0" result="blurredColor"/>
            <!-- Darken by 75% (multiply RGB by 0.25) -->
            <feColorMatrix in="blurredColor" result="darkenedShadow" type="matrix" values="0.25 0    0    0  0
                     0    0.25 0    0  0
                     0    0    0.25 0  0
                     0    0    0    1  0"/>
            <!-- Fade it -->
            <feComponentTransfer in="darkenedShadow" result="fadedShadow">
                <feFuncA type="linear" slope="1"/>
            </feComponentTransfer>
            <!-- Put original text on top -->
            <feMerge>
                <feMergeNode in="fadedShadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="shadow-1349600516">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#404040"/>
        </filter>
        <filter id="shadow-1558331316">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#154015"/>
        </filter>
        <filter id="shadow--1000158796">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#151540"/>
        </filter>
        <filter id="shadow--978910628">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#401540"/>
        </filter>
        <filter id="shadow--748931660">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#401515"/>
        </filter>
        <filter id="shadow-1579579484">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-opacity="1" flood-color="#404015"/>
        </filter>
    </defs>
    <text filter="url(#shadow-219469091)" fractyl-id="displayname" x="55" y="60.5" text-anchor="start" dominant-baseline="central" font-family="Minecraft" font-size="20" font-weight="400" fill="{displayname#fill}">
        {displayname#text}
    </text>
    <text filter="url(#shadow-219469091)" fractyl-id="level" x="310" y="115.5" text-anchor="start" dominant-baseline="central" font-family="Minecraft" font-size="18" font-weight="400" fill="{level#fill}">
