{% macro render_header() %}

        <a href="{{ url_for('index') }}" class="brand-title">
            <img src="{{url_for('static', filename='images/logo.png')}}" alt="Voxlytics Logo">
            <span class="brand-name">Voxlytics</span>

        <a href="{{url_for('coming_soon')}}" class="btn btn-dashboard">

    </nav>
