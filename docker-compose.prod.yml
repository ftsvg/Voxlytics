services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DBPASS}
      MYSQL_DATABASE: ${DBNAME}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

  bot:
    restart: unless-stopped

  web:
    restart: unless-stopped

  renderer:
    restart: unless-stopped

volumes:
  db_data: